<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>آخر الأخبار والإعلانات | مدرسة الألسن</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --dark: #03045E; --blue: #0077B6; --light: #CAF0F8; --white: #ffffff; }
        body { font-family: 'Cairo', sans-serif; background: #f0f4f8; margin: 0; padding: 20px; }
        
        .container { max-width: 800px; margin: 0 auto; }
        .header { text-align: center; color: var(--dark); margin-bottom: 30px; }
        
        /* تنسيق كارت الإعلان */
.ad-card {
    background: #fff;
    border-radius: 15px;
    padding: 20px;
    margin-bottom: 25px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.08);
    border-right: 6px solid #3498db;
    transition: 0.3s;
}

.ad-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
}

/* تنسيق الصورة داخل الإعلان */
.ad-image-container {
    width: 100%;
    margin: 15px 0;
    overflow: hidden;
    border-radius: 10px;
}

.ad-img {
    width: 100%;
    height: auto;
    max-height: 500px; /* عشان الصورة مطولش بزيادة */
    object-fit: contain; /* يحافظ على أبعاد الصورة الأصلية */
    display: block;
    cursor: zoom-in;
    background: #f8f9fa;
}

.ad-title {
    color: #2c3e50;
    font-size: 1.4em;
    margin: 10px 0;
}

.ad-body {
    color: #555;
    line-height: 1.8;
    white-space: pre-wrap; /* عشان يحافظ على فواصل السطور اللي بتكتبها في الأدمن */
}
        /* زر العودة */
        .back-btn { 
            display: inline-block; margin-bottom: 20px; text-decoration: none; 
            color: var(--blue); font-weight: bold; 
        }
        .ad-card {
    background: white;
    padding: 15px;
    border-radius: 15px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.05);
    margin-bottom: 20px;
    border-right: 5px solid #3498db;
}
.ad-title { color: #2c3e50; margin-bottom: 10px; }
.badge { background: #e74c3c; color: white; padding: 2px 8px; border-radius: 4px; font-size: 0.8em; }
    </style>
</head>
<body>

    <div class="container">
        <a href="home.html" class="back-btn"><i class="fas fa-arrow-right"></i> العودة للرئيسية</a>
        
        <div class="header">
            <h1><i class="fas fa-bullhorn"></i> لوحة الإعلانات المركزية</h1>
            <p>تابع آخر التحديثات والقرارات المدرسية</p>
        </div>

        <div id="loading"> جاري تحميل آخر الأخبار... </div>
        <div id="ads-list"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    // 1. تهيئة Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyCV9yFJToGTbDbm2xsYfU91i6odDgRzccg",
        databaseURL: "https://alson-4492f-default-rtdb.firebaseio.com/" 
    };
    
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // 2. دالة تحميل وعرض الإعلانات
    function loadAds() {
        const adsList = document.getElementById('ads-list');
        const loading = document.getElementById('loading');

        database.ref('announcements').orderByChild('timestamp').on('value', (snapshot) => {
            if (loading) loading.style.display = "none";
            adsList.innerHTML = "";

            if (snapshot.exists()) {
                let adsArray = [];
                snapshot.forEach((child) => {
                    adsArray.push(child.val());
                });

                adsArray.reverse().forEach((ad) => {
                    // تنسيق الصورة: لو موجودة تظهر، لو مش موجودة السطر يختفي تماماً
                    const imgTag = ad.image ? 
                        `<div class="ad-image-container">
                            <img src="${ad.image}" alt="إعلان" class="ad-img" onclick="window.open(this.src)">
                         </div>` 
                        : "";

                    const adHTML = `
                        <div class="ad-card">
                            <div class="ad-header">
                                <span class="badge"><i class="fas fa-bullhorn"></i> إعلان هام</span>
                                <span class="ad-date"><i class="far fa-clock"></i> ${ad.date || ''}</span>
                            </div>
                            
                            <h3 class="ad-title">${ad.title || 'بدون عنوان'}</h3>
                            
                            ${imgTag} 
                            
                            <p class="ad-body">${ad.message || ''}</p>
                        </div>
                    `;
                    adsList.insertAdjacentHTML('beforeend', adHTML);
                });
            } else {
                adsList.innerHTML = `
                    <div style="text-align:center; padding:50px; color:#7f8c8d;">
                        <i class="fas fa-inbox fa-3x"></i>
                        <p>📭 لا توجد إعلانات منشورة حالياً.</p>
                    </div>`;
            }
        }, (error) => {
            console.error(error);
            if (adsList) adsList.innerHTML = "❌ خطأ في تحميل البيانات: " + error.message;
        });
    }

    loadAds();
</script>
</body>
</html>
